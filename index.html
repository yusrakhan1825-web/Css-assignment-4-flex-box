<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nike React</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./images/logo-img.png" alt="Nike Logo" />
        <span id="nike">NIKE</span>
        <span>REACT</span>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Product</a></li>
          <li><a href="#">About us</a></li>
          <li><a href="#">Contact us</a></li>
        </ul>
      </nav>
    </header>

    <main class="hero">
      <div class="hero-img">
        <img src="./images/shoe.png" alt="shoe pic" />
      </div>

      <div class="hero-content">
        <h1 class="product-title">
          NIKE REACT <br />
          <span>INFINITY RUN 2</span>
        </h1>
        <p class="product-description">
          The Nike React Infinity Run 2 continues to help reduce injury and keep
          you running.
        </p>
        <button class="buy-now-btn">🛒 BUY NOW</button>
      </div>
    </main>
  </body>
</html>
